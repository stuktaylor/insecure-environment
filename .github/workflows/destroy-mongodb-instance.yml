name: destroy-mongodb-instance

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.8"
  AWS_REGION: "eu-west-2"

jobs:
  destroy:
    name: Terraform Destroy MongoDB Instance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Assemble backend config
        run: |
          cat > backend.tfvars << 'BACKEND_CONFIG'
          bucket         = "${{ secrets.TF_BACKEND_BUCKET }}"
          key            = "insecure-environment/terraform.tfstate"
          region         = "${{ env.AWS_REGION }}"
          dynamodb_table = "${{ secrets.TF_BACKEND_DYNAMODB_TABLE }}"
          encrypt        = true
          BACKEND_CONFIG

      - name: Terraform Init
        run: terraform init -backend-config=backend.tfvars

      - name: Terraform Destroy MongoDB Instance
        run: terraform destroy -target=aws_instance.mongodb -auto-approve
